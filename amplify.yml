version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Use default Node (already installed in Amplify)
        - node -v

        # Install dependencies
        - yarn install --frozen-lockfile

    build:
      commands:
        - yarn build

  artifacts:
    baseDirectory: .next
    files:
      - '**/*'

  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*